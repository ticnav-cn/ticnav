  - title: "默沙东诊疗手册：儿童和青少年抽动秽语综合征和其他抽动障碍"
    organization: 默沙东
    year: 2025
    url: https://www.msdmanuals.cn/home/children-s-health-issues/neurologic-disorders-in-children/tourette-syndrome-and-other-tic-disorders-in-children-and-adolescents
